name: Release

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # For a merged PR, refs/pull/<n>/merge can lag or disappear after
          # close — check out main directly instead so we always release
          # what's actually on the base branch.
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type-check + build
        env:
          VITE_MYCELIUM_API_URL: "https://api.example.com"
        run: yarn build

      - name: Test
        run: yarn test

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
